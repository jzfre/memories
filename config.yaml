vault:
  root: /Users/jzfre/Documents/Obsidian Vault

policy:
  default_namespace: personal
  default_sensitivity: internal
  allowed_namespaces: [personal, career, brain-gym, home, public-research, testing]
  allowed_sensitivity: [public, internal]

actor: jr

connectors:
  claude-code:
    transport: stdio
    auth: none
    capabilities: [read, write]
    scope: { namespaces: "*", sensitivities: "*" }
  chatgpt:
    transport: http
    auth: token
    capabilities: [read, write]     # peer model — AI writes directly; owner reviews by editing
    scope: { namespaces: "*", sensitivities: "*" }   # every client sees everything (owner decision)
    public_base_url: ""             # set to your tunnel URL prefix, e.g. https://<host>/<MCP_HTTP_TOKEN>

note_rules:
  quarantine_invalid: false
  severities: {}                    # informational flags only; nothing blocks except secrets + body-frontmatter guards
