services:
  db:
    # Override on restricted networks by setting POSTGRES_IMAGE in a repo-root .env
    # to your Artifactory-proxied path, e.g.
    #   POSTGRES_IMAGE=artifactory.example.com/docker-remote/pgvector/pgvector:pg16
    # Compose auto-loads repo-root .env. Default works on open networks.
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: memories-db
    environment:
      POSTGRES_USER: memories
      POSTGRES_PASSWORD: memories
      POSTGRES_DB: memories
    ports:
      - "5432:5432"
    volumes:
      - memories_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memories -d memories"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memories_pgdata:
