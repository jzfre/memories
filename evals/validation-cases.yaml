# Validation eval cases for the proposal workflow.
# Each case calls createProposal with the given input and asserts the expected outcome.
# flags_include: flag codes that must appear in validationFlags
# auto_policy: expected autoPolicy value on the stored proposal
# review_state: expected reviewState on the stored proposal
# blocked: whether the proposal should be blocked (review_state=rejected due to validation)

cases:
  - id: no-source-needs-more-evidence
    input:
      namespace: personal
      sensitivity: private
      title: "A fresh observation with no sources"
      kind: note
      content: "This is an unsourced claim. It has enough content to be interesting but lacks references."
      source_refs: []
    expect:
      review_state: needs_more_evidence
      flags_include:
        - missing_source

  - id: secret-password-rejected
    input:
      namespace: personal
      sensitivity: private
      title: "DB credentials note"
      kind: note
      content: "The database password=s3cr3tV@lu3XY is stored here. Do not share."
      source_refs:
        - "https://example.com/docs"
    expect:
      review_state: rejected
      flags_include:
        - secret_detected
      blocked: true

  - id: wrong-namespace-rejected
    input:
      namespace: work/client-b
      sensitivity: private
      title: "Client B internal note"
      kind: note
      content: "This belongs to a namespace outside the gateway allowlist. It should be rejected on create."
      source_refs:
        - "meeting-notes-2026-06-01"
    expect:
      review_state: rejected
      flags_include:
        - namespace_invalid
      blocked: true

  - id: duplicate-title-candidate
    # Title matches the existing fixture document "Use Obsidian as canonical store".
    # duplicate_candidate is flagged but does not block; with a source ref the review_state
    # is pending_review (human review required to resolve the duplication).
    input:
      namespace: personal
      sensitivity: private
      title: "Use Obsidian as canonical store"
      kind: note
      content: "We should continue using Obsidian as the canonical markdown store for all personal notes. Integration with the indexer is smooth."
      source_refs:
        - "https://obsidian.md"
    expect:
      review_state: pending_review
      flags_include:
        - duplicate_candidate

  - id: clean-sourced-public-note
    input:
      namespace: personal
      sensitivity: public
      title: "Introduction to vector databases for knowledge management"
      kind: note
      content: "Vector databases allow semantic search over large corpora of text. By embedding documents as high-dimensional vectors and computing cosine similarity, you can retrieve contextually relevant results even without exact keyword matches. This is especially powerful in personal knowledge management tools."
      source_refs:
        - "https://www.pinecone.io/learn/vector-database/"
        - "https://pgvector.github.io/"
    expect:
      review_state: pending_review
      auto_policy: quick_approve_eligible

  - id: client-confidential-human-review
    input:
      namespace: work/client-a
      sensitivity: client-confidential
      title: "Client A Q3 performance findings"
      kind: finding
      content: "The Q3 performance analysis reveals a 15% throughput regression in the client-a pipeline under peak load conditions. Root cause identified as lock contention in the batch processor. Recommended remediation: implement optimistic locking pattern."
      source_refs:
        - "audit-log-2026-Q3"
    expect:
      review_state: pending_review
      auto_policy: human_review_required

  - id: secret-ref-not-flagged
    # op:// references must NOT trigger secret_detected — they are 1Password references
    input:
      namespace: personal
      sensitivity: private
      title: "UAT database reference note"
      kind: note
      content: "The read-only UAT database credential is stored in 1Password. Reference: secret_ref: op://client-a/uat-db-readonly/password — use this to authenticate during integration testing."
      source_refs:
        - "infra-runbook-2026"
    expect:
      review_state: pending_review
      auto_policy: quick_approve_eligible
